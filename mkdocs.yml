INHERIT: docs/mkdocs-base.yml

site_name: nncg
site_url: https://jebel-quant.github.io/nncg/
repo_url: https://github.com/Jebel-Quant/nncg
repo_name: Jebel-Quant/nncg

docs_dir: docs

theme:
  name: material
  logo: assets/rhiza-logo.svg
  favicon: assets/rhiza-logo.svg

# Restated from the base config (INHERIT replaces list-valued keys wholesale)
# to add `paths: [src]` — the book builds in an isolated uvx environment where
# nncg is not installed, so mkdocstrings must import it from the src layout.
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true

nav:
  - Home: index.md
  - API reference: api.md
  - Notebooks:
    - Active-set methods: notebooks/01_active_set_methods.html
    - Equality constraints: notebooks/02_equality_constraints.html
    - Test problems: notebooks/03_test_problems.html
    - Active-set vs MPRGP: notebooks/04_mprgp_vs_active_set.html
  - Reports:
    - Test report: reports/html-report/report.html
    - Coverage report: reports/html-coverage/index.html
